<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — KNOT Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/knot-base.css" />
  <link rel="stylesheet" href="../css/knot.css" />
  <style id="nav-critical">
    nav.main-nav{background:#ffffff !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:100px;}
    .nav-logo img{height:150px;width:auto;object-fit:contain;padding:24px 0;}
    .nav-search{background:none;border:none;cursor:pointer;color:#182f72;padding:6px;display:flex;align-items:center;}
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;color:#182f72;padding:6px;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
  <style>

    .page-hero-img{width:100%;display:block;object-fit:cover;}
    .content-wrap{max-width:1600px;margin:0 auto;padding:16px 24px 48px;}
    .news-controls{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
    .date-nav{display:flex;align-items:center;gap:10px;}
    .date-btn{background:#fff;border:1.5px solid #e8ecf0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:18px;transition:background .15s;}
    .date-btn:hover{background:#f4f6f8;}
    .date-label{font-size:15px;font-weight:700;color:#032a48;min-width:200px;text-align:center;}
    .search-box{flex:1;min-width:200px;padding:10px 16px;border:1.5px solid #e8ecf0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
    .search-box:focus{border-color:#032a48;}
    .cat-filter{padding:10px 14px;border:1.5px solid #e8ecf0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;}
    .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
    .news-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;cursor:pointer;}
    .news-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.12);}
    .news-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#e8ecf0;}
    .news-card-body{padding:16px;}
    .news-cat{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c0392b;margin-bottom:6px;}
    .news-headline{font-size:15px;font-weight:700;color:#032a48;line-height:1.4;margin-bottom:8px;}
    .news-meta{font-size:12px;color:#546e7a;display:flex;gap:12px;flex-wrap:wrap;}
    .news-station{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;}
    .no-results{text-align:center;padding:60px 24px;color:#546e7a;font-size:15px;}
    .cal-nav{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
    .cal-month{font-size:22px;font-weight:800;color:#032a48;min-width:200px;text-align:center;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:32px;}
    .cal-dow{text-align:center;font-size:11px;font-weight:700;color:#546e7a;text-transform:uppercase;padding:8px 0;}
    .cal-day{min-height:80px;background:#fff;border-radius:6px;padding:6px;position:relative;border:1.5px solid transparent;transition:border-color .15s;}
    .cal-day.other-month{background:#f4f6f8;opacity:.5;}
    .cal-day.today{border-color:#6c8ea3;background:#f0f6fb;}
    .cal-day.has-events{cursor:pointer;}
    .cal-day.has-events:hover{border-color:#032a48;}
    .cal-day.selected{border-color:#c0392b;background:#fff8f7;}
    .cal-day-num{font-size:13px;font-weight:600;color:#032a48;}
    .cal-day.other-month .cal-day-num{color:#b0bec5;}
    .cal-dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
    .cal-dot{width:7px;height:7px;border-radius:50%;background:#182f72;}
    .cal-dot.music{background:#6c8ea3;}.cal-dot.community{background:#2e7d32;}.cal-dot.sports{background:#e65100;}.cal-dot.government{background:#4a2d7a;}
    .events-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
    .event-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:4px solid #c0392b;}
    .event-date-badge{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#c0392b;margin-bottom:6px;}
    .event-title{font-size:16px;font-weight:700;color:#032a48;margin-bottom:6px;line-height:1.3;}
    .event-detail{font-size:13px;color:#546e7a;display:flex;align-items:center;gap:6px;margin-top:4px;}
    .event-cat{display:inline-block;padding:2px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;background:#e3f2fd;color:#1565c0;margin-top:8px;}
    .events-section-title{font-size:18px;font-weight:800;color:#032a48;margin:32px 0 16px;padding-bottom:8px;border-bottom:3px solid #c0392b;display:inline-block;}
    .show-group{margin-bottom:48px;}
    .show-group-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #032a48;}
    .show-group-name{font-size:20px;font-weight:900;color:#032a48;text-transform:uppercase;letter-spacing:.04em;}
    .show-group-station{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#6c8ea3;color:#fff;padding:3px 10px;border-radius:100px;}
    .pod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
    .pod-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;transition:transform .2s;}
    .pod-card:hover{transform:translateY(-2px);}
    .pod-img{width:100px;min-width:100px;height:100px;object-fit:cover;background:#e8ecf0;}
    .pod-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .pod-ep{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6c8ea3;}
    .pod-title{font-size:13px;font-weight:700;color:#032a48;line-height:1.4;}
    .pod-desc{font-size:12px;color:#546e7a;line-height:1.5;flex:1;}
    .pod-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
    .pod-dur{font-size:11px;color:#b0bec5;}
    .pod-play{font-size:11px;font-weight:700;color:#c0392b;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;}
    .editorial-section{padding:48px 0;border-bottom:1px solid #e8ecf0;}
    .editorial-section:last-child{border-bottom:none;}
    .editorial-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}
    .editorial-grid.reverse{direction:rtl;}.editorial-grid.reverse>*{direction:ltr;}
    .editorial-text h2{font-size:clamp(24px,3vw,36px);font-weight:900;color:#032a48;text-transform:uppercase;letter-spacing:.03em;margin-bottom:16px;line-height:1.15;}
    .editorial-text h2::after{content:'';display:block;width:48px;height:4px;background:#182f72;margin-top:10px;}
    .editorial-text p{font-size:15px;color:#444;line-height:1.8;margin-bottom:16px;}
    .editorial-img{width:100%;border-radius:8px;object-fit:cover;max-height:360px;}
    .editorial-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#032a48;color:#fff;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:background .15s;margin-top:8px;}
    .editorial-cta:hover{background:#0a2239;}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;}
    .contact-form{display:flex;flex-direction:column;gap:16px;}
    .form-field{display:flex;flex-direction:column;gap:6px;}
    .form-field label{font-size:12px;font-weight:700;color:#546e7a;text-transform:uppercase;letter-spacing:.05em;}
    .form-field input,.form-field textarea,.form-field select{padding:10px 14px;border:1.5px solid #e8ecf0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
    .form-field input:focus,.form-field textarea:focus{border-color:#032a48;}
    .form-field textarea{min-height:120px;resize:vertical;}
    .form-submit{padding:12px 28px;background:#182f72;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:background .15s;}
    .form-submit:hover{background:#a93226;}
    .contact-info-block{background:#032a48;border-radius:8px;padding:32px;color:#fff;}
    .contact-info-block h3{font-size:18px;font-weight:800;color:#fff;margin-bottom:20px;text-transform:uppercase;letter-spacing:.04em;}
    .contact-info-item{display:flex;gap:12px;margin-bottom:10px;font-size:14px;color:rgba(255,255,255,.8);line-height:1.6;}
    .contact-info-icon{font-size:22px;flex-shrink:0;margin-top:1px;width:28px;text-align:center;}
    @media(max-width:768px){
      .news-controls{flex-direction:column;align-items:stretch;}
      .editorial-grid,.contact-grid{grid-template-columns:1fr;}
      .pod-card{flex-direction:column;}.pod-img{width:100%;height:160px;}
      .cal-day{min-height:56px;}
    }

  </style>
</head>

  <script>

var API_URL="https://pbc-cms-production.up.railway.app";

// Section rendering helper — paste this logic into each page's fetch script
function renderSection(s, i) {
  var rev = (i % 2 === 1 && (s.type||'content') === 'content') ? ' reverse' : '';
  var isHeader = s.type === 'hero-header';
  var isTextOnly = s.type === 'text-only';

  // Heading tag + styles
  var hTag = s.heading_size || (isHeader ? 'h1' : 'h2');
  // For hero-header, only apply the uppercase/bold override if no explicit size was set
  var heroOverride = isHeader && !s.heading_size;
  var hSizes = {h1:'clamp(28px,4vw,48px)', h2:'clamp(22px,3vw,36px)', h3:'clamp(18px,2.5vw,26px)'};
  var hStyle = 'font-size:' + (hSizes[hTag] || hSizes.h2) + ';';
  if (s.heading_color) hStyle += 'color:' + s.heading_color + ';';
  if (s.heading_align) hStyle += 'text-align:' + s.heading_align + ';';
  if (heroOverride) hStyle += 'font-weight:900;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px;line-height:1.1;';

  // Separator
  var sepHtml = '';
  if (s.separator) {
    var sepColor = s.separator_color || '#c0392b';
    var sepAlign = s.heading_align || 'left';
    var sepMargin = sepAlign === 'center' ? '10px auto 0' : sepAlign === 'right' ? '10px 0 0 auto' : '10px 0 0';
    sepHtml = '<div style="width:48px;height:4px;background:' + sepColor + ';margin:' + sepMargin + ';"></div>';
  }

  // Body styles
  var bodySizes = {small:'13px', normal:'15px', large:'18px', xlarge:'22px'};
  var bStyle = '';
  if (s.body_size) bStyle += 'font-size:' + (bodySizes[s.body_size]||'15px') + ';';
  if (s.body_color) bStyle += 'color:' + s.body_color + ';';
  if (s.body_align) bStyle += 'text-align:' + s.body_align + ';';

  // Section bg
  var secStyle = s.bg_color ? 'background:' + s.bg_color + ';' : '';

  // CTA
  var ctaStyle = s.cta_color ? 'color:' + s.cta_color + ' !important;border-color:' + s.cta_color + ' !important;background:transparent !important;' : '';
  var ctaHtml = (s.cta_enabled !== false && s.cta_label)
    ? '<a href="../' + (s.cta_url||'#') + '" class="editorial-cta" style="' + ctaStyle + '">' + s.cta_label + ' &rsaquo;</a>'
    : '';

  // Image
  var imgHtml = '';
  if (s.image && !isHeader && !isTextOnly) {
    var imgSrc = s.image.startsWith('uploads/') ? API_URL + '/' + s.image : '../' + s.image;
    imgHtml = '<img class="editorial-img" src="' + imgSrc + '" alt="' + (s.heading||'') + '" />';
  }

  // Body paragraphs
  var bodyHtml = '';
  if (s.body) {
    bodyHtml = '<div style="' + bStyle + '">'
      + s.body.split('\n').map(function(p) { return p ? '<p style="margin-bottom:1em;">' + p + '</p>' : ''; }).join('')
      + '</div>';
  }

  if (isHeader) {
    // Hero header: full-width centered layout
    var headerAlign = s.heading_align || 'center';
    return '<div class="editorial-section" style="' + secStyle + 'text-align:' + headerAlign + ';padding:48px 24px 24px;">'
      + '<div style="max-width:800px;margin:0 auto;">'
      + '<' + hTag + ' style="' + hStyle + '">' + (s.heading||'') + '</' + hTag + '>'
      + sepHtml
      + (s.body ? '<div style="' + bStyle + 'margin-top:16px;">' + s.body.split('\n').map(function(p){ return p ? '<p style="margin-bottom:1em;">' + p + '</p>' : ''; }).join('') + '</div>' : '')
      + ctaHtml
      + '</div></div>';
  }

  if (isTextOnly) {
    return '<div class="editorial-section" style="' + secStyle + '">'
      + '<div style="max-width:860px;margin:0 auto;padding:0 24px;">'
      + (s.heading ? '<' + hTag + ' style="' + hStyle + '">' + s.heading + '</' + hTag + '>' + sepHtml : '')
      + bodyHtml
      + ctaHtml
      + '</div></div>';
  }

  // Standard content section (image + text)
  return '<div class="editorial-section" style="' + secStyle + '"><div class="editorial-grid' + rev + '">'
    + '<div class="editorial-text">'
    + (s.heading ? '<' + hTag + ' style="' + hStyle + '">' + s.heading + '</' + hTag + '>' + sepHtml : '')
    + bodyHtml
    + ctaHtml
    + '</div>'
    + imgHtml
    + '</div></div>';
}

fetch(API_URL+'/api/pages/knot-contact')
  .then(function(r){{return r.json();}})
  .then(function(p){{
    // Render editorial sections
    var secs = JSON.parse(p.sections||'[]');
    var html = secs.map(function(s, i) { return renderSection(s, i); }).join('');
    var contentEl = document.getElementById('contact-content');
    if (contentEl) contentEl.innerHTML = html;

    // Hero image
    if(p.hero_image){{
      var isMobile=window.innerWidth<=768;
      var heroSrc=isMobile&&p.mobile_hero_image?p.mobile_hero_image:p.hero_image;
      var heroUrl=heroSrc.startsWith("uploads/")?API_URL+"/"+heroSrc:"../"+heroSrc;
      var img=document.getElementById("page-hero-img");
      if(img) img.src=heroUrl;
    }}

    // Background color
    if(p.bg_color){
      var s=document.getElementById("pbc-page-bg");
      if(!s){s=document.createElement("style");s.id="pbc-page-bg";document.head.appendChild(s);}
      s.textContent=".hero,.editorial-section,.content-wrap,.inquiry-section,.psa-section,.event-submit-section,.cards-section,.schedule-wrap,.page-hero{background:"+p.bg_color+" !important}body{background:"+p.bg_color+" !important}";
    }
  }}).catch(function(){{}});

</script>
<script>

(function() {
  var API_URL = 'https://pbc-cms-production.up.railway.app';

  fetch(API_URL + '/api/globals')
    .then(function(r) { return r.json(); })
    .then(function(g) {
      // Street address
      var addr = document.getElementById('ci-address');
      if (addr && g.contact_address) {
        addr.innerHTML = g.contact_address + '<br>' + (g.contact_city || '');
      }
      // PO Box
      var pobox = document.getElementById('ci-pobox');
      if (pobox && g.contact_po_box) {
        pobox.innerHTML = g.contact_po_box + '<br>' + (g.contact_po_city || '');
      }
      // Hide PO box row if not set
      var porow = document.getElementById('ci-pobox-row');
      if (porow && !g.contact_po_box) porow.style.display = 'none';
      // Phone
      var phone = document.getElementById('ci-phone');
      if (phone && g.contact_phone) {
        phone.href = 'tel:' + g.contact_phone;
        phone.textContent = g.contact_phone;
      }
      // Email
      var email = document.getElementById('ci-email');
      if (email && g.contact_email) {
        email.href = 'mailto:' + g.contact_email;
        email.textContent = g.contact_email;
      }
    })
    .catch(function() {});
})();

</script>
<script>

(function() {

  function runSearch(q) {
    var API = 'https://pbc-cms-production.up.railway.app';
    var results = document.getElementById('pbc-search-results');
    results.innerHTML = '<div style="color:rgba(255,255,255,.6);font-size:14px;padding:12px 0;">Searching…</div>';
    var ql = q.toLowerCase();
    Promise.all([
      fetch(API + '/api/news?limit=200').then(function(r){return r.json();}).catch(function(){return [];}),
      fetch(API + '/api/events?limit=200').then(function(r){return r.json();}).catch(function(){return [];})
    ]).then(function(data) {
      var news = (data[0].items || data[0]) || [];
      var events = data[1] || [];
      var hits = [];
      news.forEach(function(n) {
        if ((n.headline||'').toLowerCase().indexOf(ql) >= 0 || (n.body||'').toLowerCase().indexOf(ql) >= 0)
          hits.push({ type:'News', label:n.headline, sub:n.category||'', href:'../pages/news.html' });
      });
      events.forEach(function(e) {
        if ((e.title||'').toLowerCase().indexOf(ql) >= 0 || (e.description||'').toLowerCase().indexOf(ql) >= 0 || (e.location||'').toLowerCase().indexOf(ql) >= 0)
          hits.push({ type:'Event', label:e.title, sub:(e.event_date||'')+(e.location?' · '+e.location:''), href:'../pages/events.html' });
      });
      if (!hits.length) {
        results.innerHTML = '<div style="color:rgba(255,255,255,.5);font-size:14px;padding:12px 0;">No results for “' + q + '”</div>';
        return;
      }
      results.innerHTML = '';
      hits.slice(0,12).forEach(function(h) {
        var a = document.createElement('a');
        a.href = h.href;
        a.style.cssText = 'display:block;background:rgba(255,255,255,.08);border-radius:8px;padding:14px 16px;text-decoration:none;transition:background .15s;margin-bottom:8px;';
        a.addEventListener('mouseover', function(){ this.style.background='rgba(255,255,255,.15)'; });
        a.addEventListener('mouseout',  function(){ this.style.background='rgba(255,255,255,.08)'; });
        a.addEventListener('click', function(){ document.getElementById('pbc-search-overlay').style.display='none'; });
        a.innerHTML = '<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c0392b;margin-bottom:4px;">'+h.type+'</div>'
          + '<div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:3px;">'+h.label+'</div>'
          + (h.sub ? '<div style="font-size:12px;color:rgba(255,255,255,.55);">'+h.sub+'</div>' : '');
        results.appendChild(a);
      });
    });
  }

  function initSearch() {
    if (!document.getElementById('pbc-search-overlay')) {
      var overlay = document.createElement('div');
      overlay.id = 'pbc-search-overlay';
      overlay.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(3,42,72,.92);z-index:99999;padding:80px 24px 24px;box-sizing:border-box;';
      overlay.innerHTML = '<div style="max-width:680px;margin:0 auto;">'
        + '<div style="display:flex;gap:12px;margin-bottom:24px;">'
        + '<input id="pbc-search-input" type="text" placeholder="Search news, events\u2026" style="flex:1;padding:14px 18px;font-size:17px;border-radius:8px;border:none;outline:none;font-family:inherit;"/>'
        + '<button onclick="document.getElementById(\'pbc-search-overlay\').style.display=\'none\'" style="background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;padding:0 18px;border-radius:8px;cursor:pointer;">&#10005;</button>'
        + '</div>'
        + '<div id="pbc-search-results" style="display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;"></div>'
        + '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.style.display = 'none'; });
    }
    // Re-wire input + Enter every open (input element freshly created each time)
    var input = document.getElementById('pbc-search-input');
    if (input && !input._wired) {
      input._wired = true;
      var t;
      input.addEventListener('input', function() {
        clearTimeout(t);
        var q = this.value.trim();
        if (q.length < 2) { document.getElementById('pbc-search-results').innerHTML = ''; return; }
        t = setTimeout(function() { runSearch(q); }, 280);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var q = this.value.trim();
          if (q.length >= 2) runSearch(q);
        }
      });
    }
    var btn = document.querySelector('.nav-search');
    if (btn && !btn._searchWired) {
      btn._searchWired = true;
      btn.addEventListener('click', function() {
        var o = document.getElementById('pbc-search-overlay');
        o.style.display = 'block';
        setTimeout(function() { document.getElementById('pbc-search-input').focus(); }, 50);
      });
    }
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initSearch); }
  else { initSearch(); }
})();

</script>
