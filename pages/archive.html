<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — KNOT Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/knot-base.css?v=12" /><link rel="stylesheet" href="../css/knot.css?v=11" />
  <style id="nav-critical">
    nav.main-nav{background:#ffffff !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:220px;}
    .nav-logo img{height:180px;width:auto;object-fit:contain;padding:7px 0;min-width:280px;}
    .nav-search{background:none;border:none;cursor:pointer;color:#182f72;padding:6px;display:flex;align-items:center;}
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;color:#182f72;padding:6px;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
</head>
<body>
  <div id="site-header"></div>

  <!-- WEATHER BAND -->
  <div id="knot-weather-band" style="background:#ffd300;overflow:hidden;height:116px;display:flex;align-items:center;padding:8px 12px;">
    <div style="flex:1;overflow:hidden;height:100px;position:relative;margin-top:-8px;background:#182f72;border-radius:4px;">
      <a class="weatherwidget-io" href="https://forecast7.com/en/34d54n112d47/prescott/?unit=us" data-label_1="PRESCOTT" data-label_2="WEATHER" data-theme="original" data-basecolor="#182f72" data-days="7">PRESCOTT WEATHER</a>
    </div>
    <div id="knot-weather-report" style="flex-shrink:0;display:none;align-items:center;gap:8px;padding:0 20px;border-left:1px solid rgba(255,255,255,0.1);min-width:520px;background:#032a48;">
      <span style="font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);">&#127925; Today&#39;s Report</span>
      <div id="knot-weather-player"></div>
    </div>
  </div>

  </div>
  <div class="page-hero"><h1>News Archive</h1><p>Browse past news and stories from KNOT.</p></div>
  <div class="content-wrap"><div id="archive-content"><div style="color:#546e7a;font-size:14px;padding:24px 0;">Loading archive…</div></div></div>
  <div id="site-footer"></div>
  <script src="../js/layout.js" data-depth="1"></script>
  <script>
(function(){
  var API='https://pbc-cms-production.up.railway.app';
  var page=1,perPage=20,total=0;
  function load(p){
    fetch(API+'/api/news?limit='+perPage+'&station_id=knot').then(function(r){return r.json();}).then(function(d){
      var items=d.items||d||[];
      var el=document.getElementById('archive-content');
      if(!items.length){el.innerHTML='<p style="color:#546e7a">No archived articles found.</p>';return;}
      el.innerHTML='<div style="display:flex;flex-direction:column;gap:12px;">'
        +items.map(function(n){
          var date=n.published_at?new Date(n.published_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
          return '<a href="../pages/article.html?id='+n.id+'" style="display:flex;gap:16px;align-items:flex-start;background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-decoration:none;transition:box-shadow .15s;" onmouseover=\"this.style.boxShadow=\'0 4px 16px rgba(0,0,0,.12)\'\" onmouseout=\"this.style.boxShadow=\'0 2px 8px rgba(0,0,0,.06)\'\">'
            +'<div style="flex:1;">'
            +(n.category?'<div style="font-size:10px;font-weight:800;color:#c0392b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">'+n.category+'</div>':'')
            +'<div style="font-size:16px;font-weight:700;color:#032a48;line-height:1.4;margin-bottom:4px;">'+n.headline+'</div>'
            +'<div style="font-size:12px;color:#90a4ae;">'+date+'</div>'
            +'</div></a>';
        }).join('')+'</div>';
    }).catch(function(){document.getElementById('archive-content').innerHTML='<p style="color:#c0392b">Could not load archive.</p>';});
  }
  load(1);
})();
</script>
<script>
(function() {
  var API = 'https://pbc-cms-production.up.railway.app';
  fetch(API + '/api/pages/knot-archive')
    .then(function(r) { return r.json(); })
    .then(function(p) {
      if (p.page_heading) {
        var h1 = document.querySelector('.page-hero h1');
        if (h1) h1.textContent = p.page_heading;
      }
      if (p.page_subheading) {
        var sub = document.querySelector('.page-hero p');
        if (sub) sub.textContent = p.page_subheading;
      }
      if (p.bg_color) {
        var s = document.getElementById('pbc-page-bg');
        if (!s) { s = document.createElement('style'); s.id = 'pbc-page-bg'; document.head.appendChild(s); }
        s.textContent = 'body, .page-hero, .content-wrap, .schedule-wrap, #shows-content, .editorial-section { background: ' + p.bg_color + ' !important; }';
      }
    }).catch(function() {});
})();
</script>

})();
</script>
