<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Program Schedule — KNOT Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/knot-base.css?v=11" />
  <link rel="stylesheet" href="../css/knot.css?v=11" />
  <style id="nav-critical">
    nav.main-nav{background:#ffffff !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:220px;}
    .nav-logo img{height:180px;width:auto;object-fit:contain;padding:7px 0;min-width:280px;}
    .nav-search{background:none;border:none;cursor:pointer;color:#182f72;padding:6px;display:flex;align-items:center;}
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;color:#182f72;padding:6px;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
  <style>
    .schedule-wrap { padding: 40px 48px; max-width: var(--max-width); margin: 0 auto; }
    .schedule-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .schedule-table th {
      padding: 10px 12px;
      background: #032a48;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align: center;
      border: 1px solid rgba(255,255,255,.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .schedule-table th.time-col { width: 70px; background: #0a2239; }
    .schedule-table td.time-cell {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #546e7a;
      white-space: nowrap;
      border: 1px solid #e8ecf0;
      vertical-align: top;
      background: #f8f9fa;
      text-align: right;
    }
    .schedule-table td.show-cell {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,.2);
      text-align: center;
      vertical-align: middle;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.4;
      cursor: default;
    }
    .schedule-table td.show-cell a {
      color: inherit;
      text-decoration: underline;
      text-decoration-style: dotted;
    }
    .schedule-table td.empty-cell {
      border: 1px solid #e8ecf0;
      background: #fff;
    }
    .schedule-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .schedule-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    @media (max-width: 768px) {
      .schedule-wrap { padding: 24px 16px; }
      .schedule-table { font-size: 11px; }
      .schedule-table th, .schedule-table td { padding: 5px 6px; }
    }

    /* ── UPCOMING GAME CARDS ─────────────────── */
    .game-card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      overflow: hidden;
      border-top: 4px solid #02a124;
    }
    .game-card-header {
      background: #02a124;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .game-date-badge {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .game-sport-badge {
      font-size: 10px;
      font-weight: 700;
      background: rgba(255,255,255,.2);
      padding: 2px 8px;
      border-radius: 100px;
    }
    .game-teams {
      padding: 16px;
      font-size: 18px;
      font-weight: 900;
      color: #182f72;
      line-height: 1.3;
    }
    .game-teams .vs { font-size: 12px; font-weight: 600; color: #546e7a; display: block; margin: 2px 0; }
    .game-meta {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .game-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #445566;
    }
    .game-meta-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #02a124;
      min-width: 60px;
    }
    .game-time-display {
      font-weight: 700;
      color: #182f72;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  </div>


  <!-- WEATHER BAND -->
  <div id="knot-weather-band" style="background:#ffd300;overflow:hidden;height:116px;display:flex;align-items:center;padding:8px 12px;">
    <div style="flex:1;overflow:hidden;height:100px;position:relative;margin-top:-8px;background:#182f72;border-radius:4px;">
      <a class="weatherwidget-io" href="https://forecast7.com/en/34d54n112d47/prescott/?unit=us" data-label_1="PRESCOTT" data-label_2="WEATHER" data-theme="original" data-basecolor="#182f72" data-days="7">PRESCOTT WEATHER</a>
    </div>
    <div id="knot-weather-report" style="flex-shrink:0;display:none;align-items:center;gap:8px;padding:0 20px;border-left:1px solid rgba(255,255,255,0.1);min-width:520px;background:#032a48;">
      <span style="font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);">&#127925; Today&#39;s Report</span>
      <div id="knot-weather-player"></div>
    </div>
  </div>
  <div id="knot-ad-banner" style="display:none;text-align:center;padding:12px 0;background:#ffffff;border-bottom:1px solid #e8ecf0;"></div>
  </div>

  <div class="page-hero">
    <h1>Program Schedule</h1>
    <p>KNOT Radio — FM 103.5 / AM 1490</p>
  </div>

  <div class="schedule-wrap">
    <div class="schedule-controls">
      <div style="font-size:13px;color:#546e7a;">All times are Mountain Time (AZ). Schedule subject to change.</div>
    </div>
    <div style="overflow-x:auto;">
      <table class="schedule-table" id="schedule-table">
        <thead>
          <tr>
            <th class="time-col">Time</th>
            <th>Monday</th>
            <th>Tue – Fri</th>
            <th>Saturday</th>
            <th>Sunday</th>
          </tr>
        </thead>
        <tbody id="schedule-body">
          <tr><td colspan="5" style="text-align:center;padding:40px;color:#546e7a;">Loading schedule…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="schedule-legend" id="schedule-legend"></div>
  </div>

  <!-- UPCOMING GAMES -->
  <div id="upcoming-games-section" style="max-width:1400px;margin:0 auto;padding:0 24px 64px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:12px;border-bottom:3px solid #02a124;">
      <span style="font-size:24px;">&#9917;</span>
      <h2 style="font-size:clamp(18px,2.5vw,26px);font-weight:900;color:#182f72;text-transform:uppercase;letter-spacing:.04em;">Upcoming Broadcasts</h2>
    </div>
    <div id="upcoming-games-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;">
      <div style="color:#546e7a;font-size:14px;padding:24px 0;">Loading upcoming games…</div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="../js/layout.js" data-depth="1"></script>
  <script>
  (function() {
    var API = 'https://pbc-cms-production.up.railway.app';
    var DAY_GROUPS = ['mon','tue-fri','sat','sun'];

    function hourLabel(h) {
      if (h === 0) return '12:00 am';
      if (h === 12) return '12:00 pm';
      return h < 12 ? h + ':00 am' : (h - 12) + ':00 pm';
    }

    var todayISO = new Date().toISOString().split('T')[0];
    Promise.all([
      fetch(API + '/api/schedule/knot').then(function(r) { return r.json(); }),
      fetch(API + '/api/schedule/knot/overrides').then(function(r) { return r.json(); }).catch(function() { return []; })
    ]).then(function(results) {
        var d = results[0];
        var overrides = results[1] || [];
        var shows = d.shows || [];
        var slots = d.slots || [];
        var tbody = document.getElementById('schedule-body');
        var legend = document.getElementById('schedule-legend');

        if (!slots.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#546e7a;">Schedule coming soon.</td></tr>';
          return;
        }

        // Build grid: for each hour, for each day group, find the slot
        var rows = '';
        var covered = {}; // key: "day-hour"
        var nowH = new Date().getHours();
        var isToday = true; // schedule page shows today's grid

        // Filter today's overrides
        var todayOverrides = overrides.filter(function(o) { return o.override_date === todayISO; });

        for (var h = 0; h < 24; h++) {
          rows += '<tr>';
          rows += '<td class="time-cell">' + hourLabel(h) + '</td>';

          DAY_GROUPS.forEach(function(day) {
            var key = day + '-' + h;
            if (covered[key]) return;

            // Check for today's override first (only applies to today's day column)
            var override = null;
            if (day === 'mon' || day === 'tue-fri') { // today maps to one of these
              override = todayOverrides.find(function(o) { return o.start_hour <= h && o.end_hour > h; });
            }

            var slot = null;
            for (var i = 0; i < slots.length; i++) {
              if (slots[i].day_group === day && slots[i].start_hour <= h && slots[i].end_hour > h) {
                slot = slots[i];
                break;
              }
            }

            // Check for scheduled game on today's date
            var game = todayOverrides.length === 0 ? null : null; // games handled separately
            var todayGame = (d.games || []).find(function(g) { return g.game_date === todayISO && g.start_hour <= h && g.end_hour > h; });

            if (override && override.start_hour === h && (day === 'mon' || day === 'tue-fri')) {
              var span = override.end_hour - override.start_hour;
              for (var fh = h + 1; fh < override.end_hour; fh++) { covered[day + '-' + fh] = true; }
              rows += '<td class="show-cell override-cell" rowspan="' + span + '" style="background:#182f72;color:#ffd300;border:2px solid #ffd300;">'
                + '⚽ ' + override.name
                + (override.note ? '<br><small style="opacity:.7;font-weight:400;">' + override.note + '</small>' : '')
                + '</td>';
            } else if (todayGame && todayGame.start_hour === h && (day === 'mon' || day === 'tue-fri')) {
              var span = todayGame.end_hour - todayGame.start_hour;
              for (var fh = h + 1; fh < todayGame.end_hour; fh++) { covered[day + '-' + fh] = true; }
              var gameName = (todayGame.away_team && todayGame.home_team)
                ? todayGame.away_team + ' @ ' + todayGame.home_team
                : todayGame.sport;
              rows += '<td class="show-cell" rowspan="' + span + '" style="background:#02a124;color:#ffffff;font-weight:800;">'
                + '⚽ ' + gameName
                + (todayGame.network ? '<br><small style="opacity:.8;font-weight:400;">' + todayGame.network + '</small>' : '')
                + '</td>';
            } else if (slot && slot.start_hour === h) {
              var span = slot.end_hour - slot.start_hour;
              for (var fh = h + 1; fh < slot.end_hour; fh++) { covered[day + '-' + fh] = true; }
              var cellContent = slot.link_url
                ? '<a href="' + slot.link_url + '" target="_blank">' + slot.name + '</a>'
                : slot.name;
              rows += '<td class="show-cell" rowspan="' + span + '" style="background:' + slot.color + ';color:' + (slot.text_color || '#fff') + ';">' + cellContent + '</td>';
            } else if (!slot && !(override && covered[key])) {
              rows += '<td class="empty-cell"></td>';
            }
          });

          rows += '</tr>';
        }

        tbody.innerHTML = rows;

        // Legend + overrides notice
        var overrideLegend = todayOverrides.length
          ? '<div class="legend-item" style="background:#182f72;color:#ffd300;padding:4px 10px;border-radius:4px;border:1.5px solid #ffd300;">⚽ Game override active today</div>'
          : '';
        legend.innerHTML = overrideLegend + shows.map(function(s) {
          return '<div class="legend-item">'
            + '<div class="legend-swatch" style="background:' + s.color + ';"></div>'
            + s.name
            + '</div>';
        }).join('');
      })
      .catch(function() {
        document.getElementById('schedule-body').innerHTML =
          '<tr><td colspan="5" style="text-align:center;padding:40px;color:#c0392b;">Could not load schedule.</td></tr>';
      });

    // ── LOAD UPCOMING GAMES ──────────────────────────────────────
    fetch(API + '/api/schedule/knot/games')
      .then(function(r) { return r.json(); })
      .then(function(games) {
        var grid = document.getElementById('upcoming-games-grid');
        if (!games || !games.length) {
          grid.innerHTML = '<p style="color:#546e7a;font-size:14px;grid-column:1/-1;">No games currently scheduled. Check back soon!</p>';
          return;
        }
        grid.innerHTML = games.map(function(g) {
          var dateObj = new Date(g.game_date + 'T12:00:00');
          var dateStr = dateObj.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
          var awayTeam = g.away_team || '';
          var homeTeam = g.home_team || '';
          var timeDisplay = '';
          if (g.broadcast_time_et) {
            var m = g.broadcast_time_et.match(/(\d+)(?::(\d+))?\s*(am|pm|AM|PM)/i);
            if (m) {
              var h = parseInt(m[1]); var min = m[2] || '00'; var ap = m[3].toUpperCase();
              if (ap === 'PM' && h !== 12) h += 12;
              if (ap === 'AM' && h === 12) h = 0;
              var mtH = h - 2; var mtAp = 'AM';
              if (mtH < 0) mtH += 24;
              if (mtH >= 12) { mtAp = 'PM'; if (mtH > 12) mtH -= 12; }
              else if (mtH === 0) mtH = 12;
              timeDisplay = g.broadcast_time_et.toUpperCase().replace(/\s*ET$/i,'') + ' ET / ' + mtH + ':' + min + ' ' + mtAp + ' MT';
            } else { timeDisplay = g.broadcast_time_et; }
          }
          return '<div class="game-card">'
            + '<div class="game-card-header">'
            + '<span class="game-date-badge">' + dateStr + '</span>'
            + '<span class="game-sport-badge">' + g.sport + '</span>'
            + '</div>'
            + '<div class="game-teams">'
            + (awayTeam || 'Away')
            + '<span class="vs">at</span>'
            + (homeTeam || 'Home')
            + '</div>'
            + '<div class="game-meta">'
            + (timeDisplay ? '<div class="game-meta-row"><span class="game-meta-label">Time</span><span class="game-time-display">' + timeDisplay + '</span></div>' : '')
            + (g.network ? '<div class="game-meta-row"><span class="game-meta-label">Network</span><span>' + g.network + '</span></div>' : '')
            + (g.location ? '<div class="game-meta-row"><span class="game-meta-label">Location</span><span>' + g.location + '</span></div>' : '')
            + (g.announcer ? '<div class="game-meta-row"><span class="game-meta-label">Announcer</span><span>' + g.announcer + '</span></div>' : '')
            + (g.notes ? '<div class="game-meta-row"><span class="game-meta-label">Notes</span><span style="color:#546e7a;font-style:italic;">' + g.notes + '</span></div>' : '')
            + '</div></div>';
        }).join('');
      })
      .catch(function() {
        var grid = document.getElementById('upcoming-games-grid');
        if (grid) grid.innerHTML = '<p style="color:#546e7a;">Could not load games.</p>';
      });
  })();
  </script>
<script>
(function() {
  var s = document.getElementById('pbc-page-bg');
  if (!s) { s = document.createElement('style'); s.id = 'pbc-page-bg'; document.head.appendChild(s); }
  s.textContent = 'body, .page-hero, .content-wrap, .schedule-wrap, #shows-content { background: #ffffff !important; }';
})();
</script>

</body>
</html>
