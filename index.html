<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Team 1450 KNOT — Prescott's Sports Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/knot-base.css?v=11" />
  <link rel="stylesheet" href="css/knot.css?v=11" />
  <style id="nav-critical">
    nav.main-nav{background:#ffffff !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:220px;}
    .nav-logo img{height:180px;width:auto;object-fit:contain;padding:7px 0;min-width:280px;}
    .nav-search{background:none;border:none;cursor:pointer;color:#182f72;padding:6px;display:flex;align-items:center;}
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;color:#182f72;padding:6px;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}.nav-links li a{padding:6px 7px;font-size:11px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
</head>
<body class="knot-home">
  <div id="site-header"></div>

  <!-- HERO -->
  <section id="hero-section" style="width:100%;position:relative;">
    <img src="" alt="KNOT Radio" id="knot-hero-img" style="width:100%;display:block;height:auto;" onerror="this.style.display='none'" />
  </section>

  <!-- ON AIR BAR -->
  <div class="on-air-bar" id="on-air-bar" style="display:none;padding-bottom:12px;">
    <span class="on-air-badge">On Air Now</span>
    <span class="on-air-show" id="on-air-show"></span>
    <span class="on-air-host" id="on-air-host"></span>
    <span class="on-air-time" id="on-air-time"></span>
    <div style="display:flex;gap:10px;margin-left:auto;flex-shrink:0;align-items:center;">
      <a href="#" data-listen="knot" style="display:inline-flex;align-items:center;gap:6px;background:#182f72;color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-decoration:none;white-space:nowrap;">&#9654; Listen Live</a>
      <a href="#" id="watch-live-btn" style="display:none;align-items:center;gap:6px;background:rgba(24,47,114,.15);color:#1a1a1a;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-decoration:none;white-space:nowrap;border:1px solid rgba(24,47,114,.3);">&#128250; Watch Live</a>
    </div>
  </div>

  <!-- WEATHER BAND — navy bg, yellow accent border, readable widget -->
  <div id="knot-weather-band" style="background:#ffd300;overflow:hidden;height:116px;display:flex;align-items:center;padding:8px 12px;">
    <div style="flex:1;overflow:hidden;height:100px;position:relative;margin-top:-8px;background:#182f72;border-radius:4px;">
      <a class="weatherwidget-io" href="https://forecast7.com/en/34d54n112d47/prescott/?unit=us" data-label_1="PRESCOTT" data-label_2="WEATHER" data-theme="original" data-basecolor="#182f72" data-days="7">PRESCOTT WEATHER</a>
    </div>
    <div id="knot-weather-report" style="flex-shrink:0;display:none;align-items:center;gap:8px;padding:0 20px;border-left:1px solid rgba(255,255,255,0.15);min-width:520px;background:#182f72;">
      <span style="font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);">&#127925; Today's Report</span>
      <div id="knot-weather-player"></div>
    </div>
  </div>

  <!-- Sticky stack script (homepage) -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      var nav = document.querySelector('nav.main-nav');
      var onAir = document.getElementById('on-air-bar');
      var weather = document.getElementById('knot-weather-band');
      if (!nav || !nav.parentNode || document.getElementById('knot-sticky-stack')) return;
      var wrapper = document.createElement('div');
      wrapper.id = 'knot-sticky-stack';
      wrapper.style.cssText = 'position:sticky;top:0;z-index:1000;';
      nav.parentNode.insertBefore(wrapper, nav);
      wrapper.appendChild(nav);
      if (onAir) wrapper.appendChild(onAir);
      if (weather) wrapper.appendChild(weather);
      nav.style.position = 'relative';
    }, 100);
  });
  </script>

  <div id="knot-ad-banner" style="display:none;text-align:center;padding:12px 0;background:#ffffff;border-bottom:1px solid #e8ecf0;"></div>

  <!-- NEWS + VIDEO SIDEBAR (2/3 + 1/3) -->
  <div id="home-top-row" style="display:block;background:#ffffff;">

    <!-- LEFT: News -->
    <section style="padding:48px 48px;background:#ffffff;" id="news-section">
      <div class="section-header">
        <h2 class="section-title">Latest News</h2>
        <a href="pages/news.html" class="section-link">View All News &rsaquo;</a>
      </div>
      <div class="news-grid" id="news-grid">
        <div style="color:#546e7a;font-size:14px;padding:24px 0;">Loading news…</div>
      </div>
    </section>

    <!-- RIGHT: Video sidebar -->
    <div id="home-video-sidebar" style="display:none;">
      <div>
        <div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;">&#128247; Live — Courthouse Plaza</div>
        <div style="position:relative;width:100%;padding-bottom:56.25%;border-radius:8px;overflow:hidden;background:#000;">
          <iframe
            src="https://www.youtube.com/embed/GXZg8SFR4LI?autoplay=1&mute=1&controls=1&modestbranding=1&rel=0"
            style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
            allow="autoplay; fullscreen"
            allowfullscreen>
          </iframe>
        </div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;">&#9733; Sponsored</div>
        <div style="position:relative;width:100%;padding-bottom:56.25%;border-radius:8px;overflow:hidden;background:#000;">
          <iframe
            src="https://www.youtube.com/embed/A_cuyvgU_g4?autoplay=1&mute=1&loop=1&playlist=A_cuyvgU_g4&controls=0&modestbranding=1&rel=0"
            style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
            allow="autoplay; fullscreen"
            allowfullscreen>
          </iframe>
        </div>
        <a href="https://olsensgrain.com" target="_blank" rel="noopener"
          style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:8px 12px;background:rgba(255,255,255,0.07);border-radius:6px;text-decoration:none;transition:background .15s;"
          onmouseover="this.style.background='rgba(255,255,255,0.13)'"
          onmouseout="this.style.background='rgba(255,255,255,0.07)'">
          <span style="font-size:12px;font-weight:700;color:#fff;">Olsen's for Healthy Animals</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);">olsensgrain.com &rsaquo;</span>
        </a>
      </div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <section style="padding:48px 48px;background:#ffffff;" id="schedule-section">
    <div class="section-header">
      <h2 class="section-title">Today's Lineup</h2>
      <a href="pages/schedule.html" class="section-link">Full Schedule &rsaquo;</a>
    </div>
    <div class="schedule-grid" id="schedule-grid">
      <div style="color:#546e7a;font-size:14px;padding:24px 0;">Loading schedule…</div>
    </div>
  </section>

  <style>
    @media (max-width: 900px) {
      #home-top-row { grid-template-columns: 1fr !important; }
      #home-video-sidebar { align-self:auto !important; }
    }
  </style>

  <div id="site-footer"></div>
  <script src="js/layout.js" data-depth="0"></script>

<script>
(function() {
  var API = 'https://pbc-cms-production.up.railway.app';

  Promise.all([
    fetch(API + '/api/stations/knot').then(function(r){return r.json();}),
    fetch(API + '/api/pages/knot-home').then(function(r){return r.json();}).catch(function(){return {};})
  ]).then(function(res) {
    var s = res[0];
    var p = res[1];

    // ── ON AIR (override-aware) ──────────────────────────────────
    (function() {
      var _now = new Date();
      var _nowH = _now.getHours();
      var _todayISO = _now.toISOString().split('T')[0];
      var _dow = _now.getDay();
      var _todayGroup = _dow === 0 ? 'sun' : _dow === 6 ? 'sat' : _dow === 1 ? 'mon' : 'tue-fri';
      function _fmtH(h) { if(h===0)return'12:00 AM'; if(h===12)return'12:00 PM'; return h<12?h+':00 AM':(h-12)+':00 PM'; }
      Promise.all([
        fetch(API + '/api/schedule/knot').then(function(r){return r.json();}),
        fetch(API + '/api/schedule/knot/overrides').then(function(r){return r.json();}).catch(function(){return [];})
      ]).then(function(res) {
        var slots = (res[0] && res[0].slots) ? res[0].slots : [];
        var overrides = res[1] || [];
        var ov = overrides.find(function(o) { return o.override_date === _todayISO && o.start_hour <= _nowH && o.end_hour > _nowH; });
        if (ov) {
          document.getElementById('on-air-show').textContent = '⚽ ' + ov.name;
          document.getElementById('on-air-time').textContent = _fmtH(ov.start_hour) + ' – ' + _fmtH(ov.end_hour);
          document.getElementById('on-air-bar').style.display = 'flex';
          return;
        }
        var current = slots.find(function(sl) { return sl.day_group === _todayGroup && sl.start_hour <= _nowH && sl.end_hour > _nowH; });
        if (!current && _todayGroup === 'mon') current = slots.find(function(sl) { return sl.day_group === 'tue-fri' && sl.start_hour <= _nowH && sl.end_hour > _nowH; });
        if (current) {
          document.getElementById('on-air-show').textContent = current.name;
          document.getElementById('on-air-host').textContent = '';
          document.getElementById('on-air-time').textContent = _fmtH(current.start_hour) + ' – ' + _fmtH(current.end_hour);
          document.getElementById('on-air-bar').style.display = 'flex';
        }
      }).catch(function(){});
    })();

    // ── HERO IMAGE ───────────────────────────────────────────────
    if (p.hero_image) {
      var heroImg = document.getElementById('knot-hero-img');
      if (heroImg) heroImg.src = p.hero_image;
    }

    // ── NEWS ─────────────────────────────────────────────────────
    fetch(API + '/api/news?limit=6').then(function(r){return r.json();}).then(function(d) {
      var items = (d.items || d) || [];
      var grid = document.getElementById('news-grid');
      if (!items.length) { grid.innerHTML = '<p style="color:#546e7a">No news yet.</p>'; return; }
      grid.innerHTML = items.map(function(n) {
        var img = n.image ? (n.image.startsWith('http') ? n.image : n.image.startsWith('/uploads/') ? 'https://pbc-cms-production.up.railway.app' + n.image : n.image.startsWith('uploads/') ? 'https://pbc-cms-production.up.railway.app/' + n.image : 'images/news-placeholder.png') : 'images/news-placeholder.png';
        var date = n.published_at ? new Date(n.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        return '<a href="pages/article.html?id='+n.id+'" class="news-card" style="text-decoration:none;">'
          + '<div class="news-card-img-wrap"><img src="'+img+'" class="news-card-img" alt="'+n.headline+'" onerror="this.src=\'images/news-placeholder.png\'" /></div>'
          + '<div class="news-card-body">'
          + (n.category ? '<div class="news-card-cat">'+n.category+'</div>' : '')
          + '<div class="news-card-title">'+n.headline+'</div>'
          + '<div class="news-card-date">'+date+'</div>'
          + '</div></a>';
      }).join('');
    }).catch(function(){});

    // ── SCHEDULE ─────────────────────────────────────────────────
    Promise.all([
      fetch(API + '/api/schedule/knot').then(function(r){return r.json();}),
      fetch(API + '/api/schedule/knot/overrides').then(function(r){return r.json();}).catch(function(){return [];})
    ]).then(function(results) {
      var d = results[0];
      var overrides = results[1] || [];
      var slots = d.slots || [];
      var grid = document.getElementById('schedule-grid');
      if (!slots.length) { grid.innerHTML = '<p style="color:#546e7a">Schedule coming soon.</p>'; return; }
      var now = new Date();
      var nowH = now.getHours();
      var dow = now.getDay();
      var todayGroup = dow === 0 ? 'sun' : dow === 6 ? 'sat' : dow === 1 ? 'mon' : 'tue-fri';
      var todaySlots;
      if (todayGroup === 'mon') {
        var merged = {};
        slots.filter(function(sl){return sl.day_group==='tue-fri';}).forEach(function(sl){merged[sl.start_hour]=sl;});
        slots.filter(function(sl){return sl.day_group==='mon';}).forEach(function(sl){merged[sl.start_hour]=sl;});
        todaySlots = Object.values(merged).sort(function(a,b){return a.start_hour-b.start_hour;});
      } else {
        todaySlots = slots.filter(function(sl){return sl.day_group===todayGroup;}).sort(function(a,b){return a.start_hour-b.start_hour;});
      }
      var currentIdx = -1;
      for (var i = 0; i < todaySlots.length; i++) {
        if (todaySlots[i].start_hour <= nowH && todaySlots[i].end_hour > nowH) { currentIdx = i; break; }
      }
      var startFrom = currentIdx >= 0 ? currentIdx : todaySlots.findIndex(function(sl){return sl.start_hour>nowH;});
      if (startFrom < 0) startFrom = 0;
      var display = todaySlots.slice(startFrom, startFrom + 6);
      function fmtH(h) { if(h===0)return'12:00 AM'; if(h===12)return'12:00 PM'; return h<12?h+':00 AM':(h-12)+':00 PM'; }
      var todayISO = now.toISOString().split('T')[0];
      grid.innerHTML = display.map(function(sl) {
        var isNow = sl.start_hour <= nowH && sl.end_hour > nowH;
        // Check for override at this hour
        var override = overrides.find(function(o) {
          return o.override_date === todayISO && o.start_hour <= sl.start_hour && o.end_hour >= sl.end_hour;
        });
        var showName = override ? ('⚽ ' + override.name) : (sl.name || '');
        var isOverride = !!override;
        return '<div class="schedule-card'+(isNow?' on-air-now':''+(isOverride?' override-slot':''))+'">'
          + '<div class="schedule-time">'+(isNow?'&#9654; On Air Now &mdash; ':'')+fmtH(sl.start_hour)+' &ndash; '+fmtH(sl.end_hour)+'</div>'
          + '<div class="schedule-show">'+showName+'</div>'
          + '</div>';
      }).join('');
    }).catch(function(){});

  }).catch(function(e){ console.error('KNOT home error:', e); });
})();
</script>
<script src="js/player.js"></script>
<script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
</body>
</html>
